        font-weight="700" font-size="44" letter-spacing="2" fill="#1b75bb">PSL</text>

  <!-- Red sparkle accents -->
  <g fill="#e3242b">
    <path d="M52 30 C52 38.5 50.2 40.3 44 40.3 C50.2 40.3 52 42.1 52 50.6 C52 42.1 53.8 40.3 60 40.3 C53.8 40.3 52 38.5 52 30 Z"/>
    <path d="M176 62 C176 68.2 174.6 69.6 170 69.6 C174.6 69.6 176 71 176 77.2 C176 71 177.4 69.6 182 69.6 C177.4 69.6 176 68.2 176 62 Z"/>
