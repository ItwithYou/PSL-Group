<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 120" role="img" aria-label="PSL Group logo">
  <!-- Badge background -->
  <ellipse cx="110" cy="60" rx="104" ry="50" fill="#ffffff" stroke="#1b75bb" stroke-width="2.5"/>

  <!-- Orbit swoosh: blue top ribbon + green bottom ribbon framing the wordmark -->
